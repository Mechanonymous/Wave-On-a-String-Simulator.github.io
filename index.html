<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaveLab Physics Simulation</title>

    <!-- External background stylesheet -->
    <link rel="stylesheet" href="background.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #0b132b;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- STATE 1: MENU SCREEN --- */
        #menu-screen {
            transform: translateY(-100px);
            max-width: 500px;
            padding: 20px;
            z-index: 10;
        }

       
          #menu-screen h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            color: white;                 /* text color */
            background: linear-gradient(135deg, #ffffff, #4ea8de); /* gradient background */
            padding: 15px 30px;           /* spacing inside box */
            border-radius: 12px;          /* rounded corners */
            display: inline-block;        /* shrink box to fit text */
            background-clip: text; /* standard property for compatibility */
            -webkit-text-fill-color: transparent;
          }

        #menu-screen p {
            color: #ffffff;
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap; /* allows multiple rows if needed */
        }

        .btn {
            background: #0284c7;
            color: white;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
            text-decoration: none;
        }

        .btn:hover {
            background: #0369a1;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #1c2541;
            border: 1px solid #3a506b;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: #233154;
            border-color: #4ea8de;
        }
       
    </style>
</head>
<body>

    <div id="menu-screen">
      
        <h1>Wave on a String Simulation</h1>
        <p>Physics: Wave on a String Live Simulation<br>by BSCPE201</p>
        <div class="btn-group">
            <!-- Added links -->
            <a href="simulation.html" class="btn">Start Simulation</a>
            <a href="description.html" class="btn">Description</a>
        </div>
        
    </div>

</body>
</html>
