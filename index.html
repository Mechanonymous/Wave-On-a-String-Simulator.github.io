<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wave on a String — Velocity Driven Source</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      align-items: center;
    }
    header { padding:12px 16px; background:#0b5; color:#012; font-weight:600; width:100%; box-sizing:border-box; }
    #controls { display:flex; gap:12px; padding:12px; align-items:center; flex-wrap:wrap; background:#f6f6f6; width:100%; box-sizing:border-box; }
    label { font-size:13px; color:#222; }
    canvas { background: #111; display:block; width:100%; max-width: 900px; height:60vh; cursor: crosshair; }
    canvas:active { cursor: grabbing; }
    .btn { padding:8px 12px; border-radius:6px; border:1px solid #ccc; background:#fff; cursor:pointer; }
    .btn.primary { background:#0b5; color:#fff; border-color:#089; }
    .small { font-size:13px; padding:6px 8px; }
    .group { display:flex; gap:8px; align-items:center; }
    .range { width:180px; }
    footer { padding:12px; font-size:14px; color:#444; background:#fafafa; margin-top:auto; width:100%; box-sizing:border-box; text-align: center; }
  </style>
</head>
<body>
  <header>Wave on a String — Interactive Simulation</header>

  <div id="controls">
    <div class="group">
      <button id="playPause" class="btn primary">Pause</button>
      <button id="reset" class="btn">Reset</button>
    </div>

    <div class="group">
      <label for="damping">Damping</label>
      <input id="damping" class="range" type="range" min="0" max="0.1" step="0.001" value="0.01">
      <span id="dampingVal">0.010</span>
      <button id="dampingToggle" class="btn small primary">On</button>
    </div>

    <div class="group">
      <label>Source</label>
      <button id="manualBtn" class="btn small primary">Manual (Drive Edge)</button>
      <button id="autoBtn" class="btn small">Automatic</button>
      <label for="freq" style="margin-left:8px">Freq</label>
      <input id="freq" type="range" min="0.5" max="10" step="0.1" value="2" class="range">
      <span id="freqVal">2.0 Hz</span>
    </div>

    <div class="group">
      <label for="speed">Sim Speed</label>
      <input id="speed" type="range" min="0.2" max="2.0" step="0.1" value="1" class="range">
      <span id="speedVal">1.0x</span>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <footer>Click and drag vertically on the canvas to manually drive the wave. Toggle Automatic to inject a sinusoidal velocity source.</footer>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { alpha: false });

  // Controls
  const playPauseBtn = document.getElementById('playPause');
  const resetBtn = document.getElementById('reset');
  const dampingSlider = document.getElementById('damping');
  const dampingVal = document.getElementById('dampingVal');
  const dampingToggle = document.getElementById('dampingToggle');
  const manualBtn = document.getElementById('manualBtn');
  const autoBtn = document.getElementById('autoBtn');
  const freqSlider = document.getElementById('freq');
  const freqVal = document.getElementById('freqVal');
  const speedSlider = document.getElementById('speed');
  const speedVal = document.getElementById('speedVal');

  // DPI-aware canvas sizing
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const cssW = canvas.clientWidth || Math.floor(window.innerWidth * 0.5);
    const cssH = canvas.clientHeight || Math.floor(window.innerHeight * 0.6);
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    canvas.width = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // Simulation parameters
  const N = 300;
  let u = new Float32Array(N);
  let uPrev = new Float32Array(N);
  let uNext = new Float32Array(N);
  const dx = 1;
  let c = 1.0;
  let dt = 0.02;
  let running = true;
  let damping = parseFloat(dampingSlider.value);
  let dampingEnabled = true;
  let manualMode = true;
  let autoMode = false;
  let sourceFreq = parseFloat(freqSlider.value);
  let simSpeed = parseFloat(speedSlider.value);
  let time = 0;

  // New Variables for requested Damping Behavior
  let drive = 0;
  let isDragging = false;

  function reset() {
    u.fill(0);
    uPrev.fill(0);
    uNext.fill(0);
    time = 0;
    drive = 0;
  }
  reset();

  // Main finite-difference step
  function step() {
    const r = (c * dt / dx) ** 2;

    // interior updates
    for (let i = 1; i < N - 1; i++) {
      uNext[i] = 2 * u[i] - uPrev[i] + r * (u[i+1] - 2*u[i] + u[i-1]);
      if (dampingEnabled && damping > 0) {
        const vel = (u[i] - uPrev[i]) / dt;
        uNext[i] -= damping * vel * dt;
      }
    }

    // Boundary Handling
    if (autoMode) {
      const srcVel = Math.sin(2 * Math.PI * sourceFreq * time) * 0.6; 
      uNext[1] += srcVel * dt;
      if (N > 3) uNext[2] += srcVel * dt * 0.5;
      uNext[0] = 0;           
      uNext[N - 1] = 0;       
    } else {
      // Requested Feature: Damped Manual Driver
      if (isDragging) {
        uNext[0] = drive;
      } else {
        // Smoothly settle the driven end back to equilibrium when mouse is released
        let effectiveDamp = dampingEnabled ? damping : 0.01;
        drive *= (1 - (effectiveDamp * 0.8 + 0.01));
        uNext[0] = drive;
      }
      
      // Lock current and prev history arrays at the boundary to act as a solid actuator
      u[0] = uNext[0];
      uPrev[0] = uNext[0];

      uNext[N - 1] = 0;
    }

    // rotate buffers
    let tmp = uPrev; uPrev = u; u = uNext; uNext = tmp;
    time += dt * simSpeed;
  }

  // Drawing routine
  function draw() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, w, h);

    const midY = h * 0.5;
    ctx.strokeStyle = '#333';
    ctx.lineWidth = Math.max(1, 1);
    ctx.beginPath();
    ctx.moveTo(0, midY);
    ctx.lineTo(w, midY);
    ctx.stroke();

    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < N; i++) {
      const x = (i / (N - 1)) * w;
      // Drawing displacement scaled by 35% of canvas height
      const y = midY + u[i] * (h * 0.35);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // optional nodes
    ctx.fillStyle = '#0ff';
    const stepNode = Math.max(1, Math.floor(N / 30));
    for (let i = 0; i < N; i += stepNode) {
      const x = (i / (N - 1)) * w;
      const y = midY + u[i] * (h * 0.35);
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Animation loop
  function frame() {
    if (running) {
      const steps = Math.max(1, Math.round(simSpeed));
      for (let s = 0; s < steps; s++) step();
    }
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // Controls wiring
  playPauseBtn.addEventListener('click', () => {
    running = !running;
    playPauseBtn.textContent = running ? 'Pause' : 'Play';
    playPauseBtn.classList.toggle('primary', running);
  });

  resetBtn.addEventListener('click', () => {
    reset();
  });

  dampingSlider.addEventListener('input', () => {
    damping = parseFloat(dampingSlider.value);
    dampingVal.textContent = damping.toFixed(3);
  });

  dampingToggle.addEventListener('click', () => {
    dampingEnabled = !dampingEnabled;
    dampingToggle.textContent = dampingEnabled ? 'On' : 'Off';
    dampingToggle.classList.toggle('primary', dampingEnabled);
  });

  manualBtn.addEventListener('click', () => {
    manualMode = true;
    autoMode = false;
    manualBtn.classList.add('primary');
    autoBtn.classList.remove('primary');
    drive = 0;
  });

  autoBtn.addEventListener('click', () => {
    autoMode = !autoMode;
    if (autoMode) {
      manualMode = false;
      autoBtn.classList.add('primary');
      manualBtn.classList.remove('primary');
      time = 0; 
    } else {
      autoBtn.classList.remove('primary');
    }
  });

  freqSlider.addEventListener('input', () => {
    sourceFreq = parseFloat(freqSlider.value);
    freqVal.textContent = sourceFreq.toFixed(1) + ' Hz';
  });

  speedSlider.addEventListener('input', () => {
    simSpeed = parseFloat(speedSlider.value);
    speedVal.textContent = simSpeed.toFixed(1) + 'x';
  });

  // Updated Mouse Interaction Logic
  function updateDrive(e) {
    const rect = canvas.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const midY = rect.height * 0.5;
    
    // Scale exactly to the drawing logic (h * 0.35)
    const targetDrive = (y - midY) / (rect.height * 0.35); 
    // Clamp the drive so extreme mouse movements don't break the physics engine
    drive = Math.max(-1.5, Math.min(1.5, targetDrive));
  }

  canvas.addEventListener('pointerdown', (e) => {
    if (!manualMode) return;
    isDragging = true;
    updateDrive(e);
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!isDragging || !manualMode) return;
    updateDrive(e);
  });

  canvas.addEventListener('pointerup', (e) => {
    if (!manualMode) return;
    isDragging = false;
    try { canvas.releasePointerCapture(e.pointerId); } catch (err) {}
  });

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    if (e.key === ' ') {
      e.preventDefault();
      playPauseBtn.click();
    } else if (e.key === 'r') {
      resetBtn.click();
    } else if (e.key === 'a') {
      if(!autoMode) autoBtn.click();
    } else if (e.key === 'm') {
      if(!manualMode) manualBtn.click();
    }
  });

  // Initial UI state
  dampingVal.textContent = damping.toFixed(3);
  freqVal.textContent = sourceFreq.toFixed(1) + ' Hz';
  speedVal.textContent = simSpeed.toFixed(1) + 'x';
  manualBtn.classList.add('primary');
})();
</script>
</body>
</html>
