<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wave on a String Simulation</title>
  <style>
    :root {
      --primary: #0284c7;
      --primary-hover: #0369a1;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      padding: 30px;
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      margin-top: 0;
      color: var(--primary);
      font-size: 2rem;
    }

    .formula-section {
      background: #f1f5f9;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 25px;
      border-left: 4px solid var(--primary);
    }

    .formula-section p {
      margin: 0 0 10px 0;
      font-weight: 600;
      color: var(--text-main);
    }

    .equation {
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.4rem;
      font-style: italic;
      color: #334155;
      letter-spacing: 1px;
    }

    canvas {
      width: 100%;
      max-width: 840px;
      height: 200px;
      border-radius: 8px;
      background: #1e293b; /* Dark background for the wave */
      margin: 0 auto 25px auto;
      display: block;
      box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.2);
      cursor: grab;
    }
    
    canvas:active {
      cursor: grabbing;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
      background: #f8fafc;
      padding: 20px;
      border-radius: 8px;
    }

    .control {
      display: flex;
      flex-direction: column;
    }

    .control label {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
    }

    .control label span {
      color: var(--primary);
    }

    input[type=range] {
      width: 100%;
      cursor: pointer;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 25px;
    }

    button {
      background: var(--text-muted);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    button:hover {
      background: #475569;
    }

    button.active {
      background: var(--primary);
      box-shadow: 0 4px 6px -1px rgb(2 132 199 / 0.4);
    }

    button#resetBtn {
      background: #ef4444;
    }
    button#resetBtn:hover {
      background: #dc2626;
    }

    #description {
      font-size: 0.95rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Wave on a String</h2>
    
    <div class="formula-section">
      <p>1D Classical Wave Equation</p>
      <div class="equation">
        &part;<sup>2</sup>y / &part;t<sup>2</sup> = c<sup>2</sup> ( &part;<sup>2</sup>y / &part;x<sup>2</sup> )
      </div>
    </div>

    <canvas id="waveCanvas" width="840" height="200"></canvas>

    <div class="button-group">
      <button id="manualBtn" class="mode-btn active">Manual Mode</button>
      <button id="oscBtn" class="mode-btn">Oscillate</button>
      <button id="pulseBtn" class="mode-btn">Pulse</button>
      <button id="endBtn">End: Fixed</button>
      <button id="resetBtn">Restart String</button>
    </div>

    <div class="controls-grid">
      <div class="control">
        <label>Amplitude <span id="ampVal">20</span></label>
        <input type="range" id="ampSlider" min="0" max="40" value="20" />
      </div>
      <div class="control">
        <label>Frequency <span id="freqVal">2.0</span></label>
        <input type="range" id="freqSlider" min="0" max="5" value="2" step="0.1" />
      </div>
      <div class="control">
        <label>Pulse Width <span id="pulseVal">1.5</span></label>
        <input type="range" id="pulseSlider" min="0" max="3" value="1.5" step="0.1" />
      </div>
      <div class="control">
        <label>Damping <span id="dampVal">0.02</span></label>
        <input type="range" id="dampSlider" min="0" max="0.1" value="0.02" step="0.005" />
      </div>
    </div>

    <div id="description"></div>
  </div>

  <script>
    const canvas = document.getElementById("waveCanvas");
    const ctx = canvas.getContext("2d");
    const descBox = document.getElementById("description");

    const N = 200;
    const dx = canvas.width / (N - 1);
    const dt = 0.016;
    const centerY = canvas.height / 2;

    let y = new Array(N).fill(0);
    let vy = new Array(N).fill(0);

    let mode = "manual"; 
    let endMode = "fixed"; 
    let drive = 0;
    let isDragging = false;

    // UI Elements
    const ampSlider = document.getElementById("ampSlider");
    const freqSlider = document.getElementById("freqSlider");
    const pulseSlider = document.getElementById("pulseSlider");
    const dampSlider = document.getElementById("dampSlider");
    
    const ampVal = document.getElementById("ampVal");
    const freqVal = document.getElementById("freqVal");
    const pulseVal = document.getElementById("pulseVal");
    const dampVal = document.getElementById("dampVal");

    const modeBtns = document.querySelectorAll('.mode-btn');
    const endBtn = document.getElementById("endBtn");

    // Update value labels on slide
    [ampSlider, freqSlider, pulseSlider, dampSlider].forEach((slider, idx) => {
      const labels = [ampVal, freqVal, pulseVal, dampVal];
      slider.addEventListener('input', (e) => {
        labels[idx].textContent = e.target.value;
      });
    });

    // Button Logic
    function setActiveMode(id, newMode) {
      mode = newMode;
      modeBtns.forEach(btn => btn.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    document.getElementById("manualBtn").onclick = () => setActiveMode("manualBtn", "manual");
    document.getElementById("oscBtn").onclick = () => setActiveMode("oscBtn", "oscillate");
    document.getElementById("pulseBtn").onclick = () => setActiveMode("pulseBtn", "pulse");
    
    document.getElementById("resetBtn").onclick = () => { 
      y.fill(0); 
      vy.fill(0); 
    };

    endBtn.onclick = () => {
      endMode = endMode === "fixed" ? "loose" : endMode === "loose" ? "no" : "fixed";
      endBtn.textContent = "End: " + (endMode.charAt(0).toUpperCase() + endMode.slice(1));
    };

    // Canvas Mouse Events
    canvas.addEventListener("mousedown", e => { if (mode==="manual") isDragging = true; });
    canvas.addEventListener("mouseup", e => { isDragging = false; drive = 0; });
    canvas.addEventListener("mouseleave", e => { isDragging = false; drive = 0; });
    canvas.addEventListener("mousemove", e => {
      if (mode==="manual" && isDragging) {
        const rect = canvas.getBoundingClientRect();
        drive = (e.clientY - rect.top - centerY) * 1.5;
      }
    });

    // Physics Engine
    function updateWave() {
      const A = parseFloat(ampSlider.value);
      const f = parseFloat(freqSlider.value);
      const damp = parseFloat(dampSlider.value);
      const pulseW = parseFloat(pulseSlider.value);
      const c = 100;
      const yOld = [...y];
      const t = performance.now() / 1000;

      if (mode==="manual") {
        y[0] = isDragging ? drive : 0;
      } else if (mode==="oscillate") {
        y[0] = A * Math.sin(2 * Math.PI * f * t);
      } else if (mode==="pulse") {
        const pulse = (t % 2 < pulseW/2) ? (1 - Math.abs((t%1)*2 - 1)) : 0;
        y[0] = A * pulse;
      }

      for (let i=1; i<N-1; i++) {
        const d2ydx2 = (yOld[i+1] - 2*yOld[i] + yOld[i-1]) / (dx*dx);
        const force = c*c*d2ydx2 - damp*vy[i];
        vy[i] += force*dt;
        y[i] += vy[i]*dt;
      }

      // Boundary Conditions
      if (endMode==="fixed") {
        y[N-1] = 0;
      } else if (endMode==="loose") {
        y[N-1] = y[N-2];
      } else if (endMode==="no") {
        y[N-1] = yOld[N-1] - (c*dt/dx) * (yOld[N-1] - yOld[N-2]);
      }
    }

    // Rendering
    function renderWave() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw center reference line
      ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, centerY);
      ctx.lineTo(canvas.width, centerY);
      ctx.stroke();

      // Draw the wave
      ctx.strokeStyle = "#38bdf8"; // Bright neon blue
      ctx.lineWidth = 3;
      ctx.lineJoin = "round";
      ctx.beginPath();
      for (let i=0; i<N; i++) {
        const x = i * dx;
        const yPoint = centerY + y[i];
        if (i===0) ctx.moveTo(x, yPoint);
        else ctx.lineTo(x, yPoint);
      }
      ctx.stroke();
    }

    // Dynamic Accessibility/UI Description
    function updateDescription() {
      const A = parseFloat(ampSlider.value);
      const f = parseFloat(freqSlider.value);
      const pulseW = parseFloat(pulseSlider.value);
      const isStill = y.every(val => Math.abs(val) < 0.1);

      let ampText = A===0 ? "zero" : A<10 ? "low" : A<25 ? "medium" : "high";
      let freqText = f===0 ? "zero" : f<1 ? "low" : f<3 ? "medium" : "high";
      let pulseText = pulseW<1 ? "narrow" : pulseW<2 ? "medium" : "wide";

      let text = "<strong>Status:</strong> ";
      if (mode==="manual") {
        text += "Interact with the left side of the canvas using your mouse to generate manual waves.";
      } else if (mode==="oscillate") {
        text += `The oscillator is generating a continuous sinusoidal wave with <em>${ampText}</em> amplitude and <em>${freqText}</em> frequency.`;
      } else {
        text += `The pulse generator is emitting periodic waves with <em>${ampText}</em> amplitude and a <em>${pulseText}</em> pulse width.`;
      }
      
      text += ` The string is currently ${isStill ? "at rest" : "in motion"}.`;

      if (endMode==="fixed") text += " The right end of the string is fixed in place, causing reflection inversion.";
      else if (endMode==="loose") text += " The right end of the string is attached to a loose ring, allowing it to slide vertically.";
      else text += " The right end of the string absorbs the wave, simulating an infinite boundary.";

      descBox.innerHTML = text;
    }

    function animate() {
      updateWave();
      renderWave();
      updateDescription();
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
